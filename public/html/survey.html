<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/survey.css">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-32x32.png" sizes="32x32">
    <title> Match Maker </title>
  </head>

  <body>

    <main class="container text-center my-2">
      <div id='welcomeContainer'>
        <h1 class="welcome"> Welcome Match Maker Survey! </h1>
        <p class="welcome"> Please complete our survey to find a match! </p>
        <h1 id="matchText" class="match hide"> We Found a Match! </h1>
      </div>
      <div id="surveyContainer" class="welcome">
        <form id="surveyForm" method="post"></form>
      </div>
      <section id="matchContainer" class="match">
        <figure id="matchPhoto" class="match mt-5"></figure>
        <h4 id="matchName" class="match"></h4>
      </section>
      <section id="homeBtnContainer">
        <button id="homeBtn" type="button" class="btn btn-secondary text-white my-4"> Restart Survey </button>
      </section>
    </main>

    <footer class="mt-5">
      <div class="d-flex flex-column align-items-center my-2">
        <aside class="col-6 text-center">
          <i class="fab fa-fw" aria-hidden="true" title="Copy to use facebook"><a href="www.facebook.com/"></a></i>
          <!-- Facebook Icon -->
          <i class="fab fa-fw" aria-hidden="true" title="Copy to use twitter"><a href="www.twitter.com/"></a> </i>
          <!-- Twitter Icon -->
          <i class="fab fa-fw" aria-hidden="true" title="Copy to use instagram"><a href="www.instagram.com/"></a> </i>
          <!-- Instagram Icon -->
          <i class="fab fa-fw" aria-hidden="true" title="Copy to use linkedin"><a href="www.linkedin/company/"></a>
            </i> <!-- Linkedin Icon -->
        </aside>
        <span class=" ">Stay Conected!</span>
        <aside class="col-6 text-center">
          <span class="">&copy; Designed and Developed by: Jorge Alberto Bucio</span>
        </aside>
      </div>
    </footer>

      crossorigin="anonymous"></script>
    <script src="../js/survey.js"></script>
